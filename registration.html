<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="registration.css">
    <title>Registration Page</title>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form = document.querySelector('form');

            form.addEventListener('submit', function (event) {
                if (!validateForm()) {
                    event.preventDefault(); 
                }
            });

            function validateForm() {
                let valid = true;

                const nameInput = document.getElementById('name');
                const nameRegex = /^[A-Za-z]+$/; // Only alphabets
                if (nameInput.value.trim() === '' || !nameRegex.test(nameInput.value)) {
                    alert('Name cannot be empty and should only contain alphabets');
                    valid = false;
                }
                const ageInput = document.getElementById('age');
                if (isNaN(ageInput.value) || ageInput.value < 0 || ageInput.value > 100) {
                    alert('Please enter a valid age between 0 and 100');
                    valid = false;
                }

                const emailInput = document.getElementById('email');
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(emailInput.value)) {
                    alert('Please enter a valid email address');
                    valid = false;
                }

                const phoneInput = document.getElementById('phone');
                const phoneRegex = /^[0-9]{10}$/;
                if (!phoneRegex.test(phoneInput.value)) {
                    alert('Please enter a valid 10-digit phone number');
                    valid = false;
                }

                const addressInput = document.getElementById('address');
                 if (addressInput.value.trim() === '' || addressInput.value.length > 100) {
                 alert('Address cannot be empty and should be less than 100 characters');
                      valid = false;
                }

                const passwordInput = document.getElementById('newPassword');
                const confirmPasswordInput = document.getElementById('Confirmpassword');
                const passwordRegex = /^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[!@#$%^&*()_+])[A-Za-z\d!@#$%^&*()_+]{8,}$/;

                if (!passwordRegex.test(passwordInput.value)) {
                    alert('Password must be 8-12 characters and contain at least one uppercase letter, one lowercase letter, one digit, and one special character');
                    valid = false;
                }

                if (passwordInput.value !== confirmPasswordInput.value) {
                    alert('Passwords do not match');
                    valid = false;
                }

                return valid;
            }
        });
    </script>
</head>

<body>
    <div class="container">
        <form>
            <h2>Registration</h2>

            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" placeholder="Enter your age" required min="0" max="100">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="phone">Telephone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" pattern="[0-9]{10}" maxlength="10" required>

            <label for="Address">Address:</label>
            <input type="text" id="address" name="Address" placeholder="House number, street, locality..." required>

            <label for="pincode">Pincode:</label>
            <input type="tel" id="pincode" name="pincode" placeholder="enter your local zipcode" required>
 

            <label for="state">State:</label>
            <select id="state" name="state" required>
                <option value="" disabled selected>Select your state</option>
                <option value="Andhra Pradesh">Andhra Pradesh</option>
<option value="Arunachal Pradesh">Arunachal Pradesh</option>
<option value="Assam">Assam</option>
<option value="Bihar">Bihar</option>
<option value="Chhattisgarh">Chhattisgarh</option>
<option value="Goa">Goa</option>
<option value="Gujarat">Gujarat</option>
<option value="Haryana">Haryana</option>
<option value="Himachal Pradesh">Himachal Pradesh</option>
<option value="Jharkhand">Jharkhand</option>
<option value="Karnataka">Karnataka</option>
<option value="Kerala">Kerala</option>
<option value="Madhya Pradesh">Madhya Pradesh</option>
<option value="Maharashtra">Maharashtra</option>
<option value="Manipur">Manipur</option>
<option value="Meghalaya">Meghalaya</option>
<option value="Mizoram">Mizoram</option>
<option value="Nagaland">Nagaland</option>
<option value="Odisha">Odisha</option>
<option value="Punjab">Punjab</option>
<option value="Rajasthan">Rajasthan</option>
<option value="Sikkim">Sikkim</option>
<option value="Tamil Nadu">Tamil Nadu</option>
<option value="Telangana">Telangana</option>
<option value="Tripura">Tripura</option>
<option value="Uttar Pradesh">Uttar Pradesh</option>
<option value="Uttarakhand">Uttarakhand</option>
<option value="West Bengal">West Bengal</option>
            </select>

            <label for="newUsername">Username:</label>
            <input type="text" id="newUsername" name="newUsername" placeholder="Enter a username" required>

        
                    <label for="newPassword">Password:</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Enter a password"
                        pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[!@#$%^&*()_+])[A-Za-z\d!@#$%^&*()_+]{8,}$"
                        required>
        
                    <label for="Confirmpassword">Confirm Password:</label>
                    <input type="password" id="Confirmpassword" name="Confirmpassword"
                        placeholder="Confirm your password" required>
        
                    <div id="password-error" style="color: red;"></div>


            <button type="submit">Register</button>
            <a href="login.html">Back to Login</a>
        </form>
    </div>
</body>

</html>
