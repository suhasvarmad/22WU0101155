<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Date</title>
    
</head>
<body>
    <h1> Today's Date</h1>
    <div id="output"></div>
    <button id="getDateButton" onclick="getCurrentDate()">Get Date</button>

    <script>
        function getCurrentDate() {
            const currentDate = new Date();
            const day = currentDate.getDate() < 10 ? '0' + currentDate.getDate() : currentDate.getDate();
            const month = currentDate.getMonth() + 1 < 10 ? '0' + (currentDate.getMonth() + 1) : currentDate.getMonth() + 1;
            const year = currentDate.getFullYear();

            const formattedDate1 = `${month}-${day}-${year}`;
            const formattedDate2 = `${month}/${day}/${year}`;
            const formattedDate3 = `${day}-${month}-${year}`;
            const formattedDate4 = `${day}/${month}/${year}`;

            const output = `Current Date:
            Format 1: ${formattedDate1}
            Format 2: ${formattedDate2}
            Format 3: ${formattedDate3}
            Format 4: ${formattedDate4}`;

            document.getElementById('output').innerText = output;
            document.getElementById('getDateButton').style.display = 'none';
        }
    </script>
</body>
</html>
